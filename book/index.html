<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay | Wild Heaven Beach Villa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap');
        body { font-family: 'Lato', sans-serif; }
        h1, h2 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center">
                    <a href="../index.html" class="text-2xl font-bold text-teal-700">WILD HEAVEN</a>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="../index.html" class="text-gray-700 hover:text-teal-600">Home</a>
                    <a href="../about/index.html" class="text-gray-700 hover:text-teal-600">About</a>
                    <a href="../photos/index.html" class="text-gray-700 hover:text-teal-600">Rooms</a>
                    <a href="../contact/index.html" class="text-gray-700 hover:text-teal-600">Contact</a>
                    <a href="index.html" class="bg-teal-600 text-white px-5 py-2 rounded-full">Book Now</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-gray-700"><i class="fas fa-bars text-2xl"></i></button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
            <a href="../index.html" class="block px-4 py-2 text-gray-700">Home</a>
            <a href="../about/index.html" class="block px-4 py-2 text-gray-700">About</a>
            <a href="../photos/index.html" class="block px-4 py-2 text-gray-700">Rooms</a>
            <a href="../contact/index.html" class="block px-4 py-2 text-gray-700">Contact</a>
            <a href="index.html" class="block px-4 py-2 text-teal-600 font-bold">Book Now</a>
        </div>
    </nav>

    <main class="flex-grow py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-bold text-gray-900">Reserve Your Paradise</h1>
                <p class="text-gray-600 mt-2">Check availability via WhatsApp instantly.</p>
            </div>

            <!-- Check Availability Form -->
            <div class="bg-white rounded-2xl shadow-xl p-8 mb-8">
                <h2 class="text-2xl font-bold mb-6 text-teal-700">Check Availability</h2>
                <form id="availability-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Check-in Date</label>
                        <input type="date" id="checkin" required class="w-full border-gray-300 rounded-lg shadow-sm focus:border-teal-500 focus:ring-teal-500 p-3 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Check-out Date</label>
                        <input type="date" id="checkout" required class="w-full border-gray-300 rounded-lg shadow-sm focus:border-teal-500 focus:ring-teal-500 p-3 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Number of Guests</label>
                        <input type="number" id="guests" min="1" max="6" value="2" required class="w-full border-gray-300 rounded-lg shadow-sm focus:border-teal-500 focus:ring-teal-500 p-3 border">
                    </div>
                    <div class="flex items-end">
                        <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 transition shadow-md flex items-center justify-center gap-2">
                            <i class="fab fa-whatsapp text-xl"></i> Check on WhatsApp
                        </button>
                    </div>
                </form>
                <p class="mt-4 text-sm text-gray-500 text-center">
                    We will confirm room availability (Double or Family) directly via chat.
                </p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-8 text-center">
        <p>&copy; 2026 Wild Heaven Beach Villa.</p>
    </footer>

    <script>
        // Mobile Menu Toggle
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
        });

        // WhatsApp Redirect Logic
        document.getElementById('availability-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const checkin = document.getElementById('checkin').value;
            const checkout = document.getElementById('checkout').value;
            const guests = document.getElementById('guests').value;
            
            // Determine suggested room type
            let roomType = guests <= 2 ? "Double Room" : "Family Room";
            
            // Format message
            const message = `Hello Wild Heaven Beach Villa,%0A%0AI would like to check availability for:%0A📅 Check-in: ${checkin}%0A📅 Check-out: ${checkout}%0A👥 Guests: ${guests}%0A🛏️ Suggested Room: ${roomType}%0A%0APlease let me know if this is available.`;
            
            // Redirect to WhatsApp
            window.open(`https://wa.me/+94710695082?text=${message}`, '_blank');
        });
    </script>
</body>
</html>
