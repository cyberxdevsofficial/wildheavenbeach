<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Availability | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-gray-900 text-white p-4">
        <a href="dashboard.html" class="mr-4">Dashboard</a>
        <a href="booking.html" class="mr-4">Bookings</a>
        <span class="font-bold">Availability</span>
        <a href="#" onclick="logout()" class="float-right text-red-400">Logout</a>
    </nav>
    <main class="max-w-4xl mx-auto py-10 px-4">
        <h1 class="text-2xl font-bold mb-6">Manage Availability</h1>
        <div class="bg-white p-6 rounded shadow">
            <p class="text-gray-600">Availability is automatically managed based on confirmed bookings in the database.</p>
            <p class="mt-2 text-gray-600">To block dates manually, you would need to add a "Blocked Dates" collection in Firestore and update the check logic in <code>book/index.html</code>.</p>
        </div>
    </main>
    <script>
        if (!sessionStorage.getItem('isAdmin')) window.location.href = 'index.html';
        window.logout = () => { sessionStorage.removeItem('isAdmin'); window.location.href = 'index.html'; };
    </script>
</body>
</html>
