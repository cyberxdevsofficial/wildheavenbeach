<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Wild Heaven Beach Villa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

    <!-- Admin Nav -->
    <nav class="bg-gray-900 text-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="font-bold text-xl">WHBV Admin</span>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="dashboard.html" class="bg-gray-800 text-white px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                        <a href="booking.html" class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Bookings</a>
                        <a href="manage.html" class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Manage Rooms</a>
                        <a href="availability.html" class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Availability</a>
                        <a href="#" onclick="logout()" class="text-red-400 hover:text-red-300 px-3 py-2 rounded-md text-sm font-medium">Logout</a>
                    </div>
                </div>
                <div class="-mr-2 flex md:hidden">
                    <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="bg-gray-800 inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-700 focus:outline-none">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="hidden md:hidden bg-gray-800" id="mobile-menu">
            <a href="dashboard.html" class="block px-3 py-2 rounded-md text-base font-medium text-white bg-gray-900">Dashboard</a>
            <a href="booking.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700">Bookings</a>
            <a href="manage.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700">Manage Rooms</a>
            <a href="availability.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700">Availability</a>
            <a href="#" onclick="logout()" class="block px-3 py-2 rounded-md text-base font-medium text-red-400 hover:text-red-300">Logout</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Dashboard Overview</h1>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white overflow-hidden shadow rounded-lg">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-teal-500 rounded-md p-3">
                            <i class="fas fa-dollar-sign text-white text-xl"></i>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">Last 30 Days Revenue</dt>
                                <dd class="text-2xl font-semibold text-gray-900" id="revenue-display">$0.00</dd>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bg-white overflow-hidden shadow rounded-lg">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-blue-500 rounded-md p-3">
                            <i class="fas fa-calendar-check text-white text-xl"></i>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">New Bookings (30 Days)</dt>
                                <dd class="text-2xl font-semibold text-gray-900" id="new-bookings-display">0</dd>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Bookings Table Preview -->
        <div class="bg-white shadow overflow-hidden sm:rounded-lg">
            <div class="px-4 py-5 sm:px-6 bg-gray-50 border-b border-gray-200">
                <h3 class="text-lg leading-6 font-medium text-gray-900">Recent Bookings</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Room</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Check In</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="recent-bookings-body">
                        <tr><td colspan="4" class="px-6 py-4 text-center text-gray-500">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, Timestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // Check Auth
        if (!sessionStorage.getItem('isAdmin')) {
            window.location.href = 'index.html';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyAOJHB4YVu7nFuyja-Mi-7muh4AQZLD6CU",
            authDomain: "wildheavenbeach-a15dd.firebaseapp.com",
            projectId: "wildheavenbeach-a15dd",
            storageBucket: "wildheavenbeach-a15dd.firebasestorage.app",
            messagingSenderId: "994457539395",
            appId: "1:994457539395:web:8814b08d5e11052f5155f6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadDashboard() {
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            const q = query(collection(db, "bookings"), where("status", "==", "confirmed"));
            const querySnapshot = await getDocs(q);
            
            let revenue = 0;
            let newBookings = 0;
            let recentHtml = '';

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const bookingDate = data.createdAt ? data.createdAt.toDate() : new Date();
                
                // Calculate Revenue (Simple logic: Double=$100, Family=$180 per night approx)
                // Note: Ideally price should be stored in DB. Using fixed estimates here.
                const nights = 1; // Simplified for demo
                const price = data.roomType === 'Double Room' ? 100 : 180;
                
                if (bookingDate >= thirtyDaysAgo) {
                    revenue += price;
                    newBookings++;
                }

                // Show last 5 in table
                if (recentHtml.split('<tr>').length <= 6) {
                    recentHtml += `
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${data.fullName}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${data.roomType}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${data.checkIn}</td>
                            <td class="px-6 py-4 whitespace-nowrap"><span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">${data.status}</span></td>
                        </tr>
                    `;
                }
            });

            document.getElementById('revenue-display').innerText = `$${revenue}`;
            document.getElementById('new-bookings-display').innerText = newBookings;
            document.getElementById('recent-bookings-body').innerHTML = recentHtml || '<tr><td colspan="4" class="px-6 py-4 text-center">No bookings found</td></tr>';
        }

        loadDashboard();

        window.logout = () => {
            sessionStorage.removeItem('isAdmin');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
